services:
  traefik:
    image: "traefik:v3.6.12"
    container_name: "traefik"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - frontend

  web:
    build:
      context: ./front-end/
    #ports:
      #- "5000:4201"
    depends_on:
      - computation
      - traefik
    networks:
      - frontend
      - backend

  computation:
    build: ./computation/
    depends_on:
      - traefik
    environment: 
      - "PYTHONUNBUFFERED=1"
    env_file: 
      - ./computation/fastapi.env
      - ./db/api_user.env
    volumes:
      - ./computation/app:/app:Z
    #ports:
      #- "8080:80"
    networks:
      - frontend
      - backend

  db:
    image: "mongo:4"
    restart: always
    env_file:
      - ./db/root_user.env
      - ./db/api_user.env
    volumes:
      - ./db/storage:/data/db:Z
      - ./db/init:/docker-entrypoint-initdb.d:Z,ro
    networks:
      - backend
    labels:
      - "traefik.enable=false"

networks:
  frontend:
    name: frontend

  backend:
    name: backend