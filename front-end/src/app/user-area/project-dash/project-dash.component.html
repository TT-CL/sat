<div class="dash-grid mode-single">
  <div class="grid-cell summary-cell-display-single">
    <div class="overlay-container" #overlayOrigin>
      <mat-card appearance="outlined">
        <mat-card-header>
          <mat-card-title>Welcome {{ userName$ | async }}</mat-card-title>
          <mat-card-subtitle>Please select a project</mat-card-subtitle>
        </mat-card-header>
        <mat-divider></mat-divider>
        <mat-card-content class="mat-card-dynamic-content">
          <div class="scrollable-content">
            @for (proj of projects$ | async; track proj; let i = $index) {
              <app-project-item class="project-item" [project]="proj" [index]="i"></app-project-item>
            }
          </div>
        </mat-card-content>
        <mat-card-footer class="new-project-area def-button">
          <button mat-flat-button color="accent" [routerLink]="['/projects/new-project']">
            <mat-icon>note_add</mat-icon>
            Start a new project
          </button>
          <input style="display: none" type="file" (change)="backupFileSelect()" #backupInput accept=".iuproj, application/json">
          <button mat-flat-button color="primary" (click)="backupInput.click()">
            <mat-icon>settings_backup_restore</mat-icon>
            Restore backup
          </button>
        </mat-card-footer>
      </mat-card>
    </div>
  </div>
</div>
