<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content class="preformatted-text">
  {{ data.message }}
</mat-dialog-content>

<mat-dialog-actions align="center">
  <button mat-flat-button [mat-dialog-close]="false" [color]="data.cancelColor"> {{ data.cancelText }} </button>
  <button mat-flat-button [color]="data.confirmColor" [mat-dialog-close]="true">
    {{ data.confirmText }}
  </button>
</mat-dialog-actions>
