<mat-sidenav-container class="sidenav-container">
  <!--
  <mat-sidenav #drawer class="sidenav" fixedInViewport
      [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
      [mode]="(isHandset$ | async) ? 'over' : 'side'"
      [opened]="(isHandset$ | async) === false">
    <mat-toolbar>Menu</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item href="#">Link 1</a>
      <a mat-list-item href="#">Link 2</a>
      <a mat-list-item href="#">Link 3</a>
    </mat-nav-list>
  </mat-sidenav>
  -->
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <!--
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()"
        *ngIf="isHandset$ | async">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      -->
      <div class="title-div" [routerLink]="(homeLink$ | async) ">
        <span class="title-span">SAT - Segmentation and Alignment Tool</span>
        <span class="version-tag">version 0.2.1</span>
      </div>
      <span class="toolbar-spacer"></span>
      <div class="navigation-button">
        <button [routerLink]="['/guide']"
          mat-flat-button
          color="primary"
          >
          Guide
        </button>
      </div>
      @if ((loggedIn$ | async) || (offlineMode$ | async)) {
        <div class="navigation-button">
          <button [routerLink]="['/projects']"
            mat-flat-button
            color="primary"
            >
            Projects
          </button>
        </div>
      }
      <div class="toolbar-end">
        @if ( (offlineMode$ | async)) {
          <mat-chip-set>
            <mat-chip highlighted
              color="accent"
              >
              Offline Mode
            </mat-chip>
          </mat-chip-set>
        }
        <app-nav-auth-widget></app-nav-auth-widget>
      </div>
    </mat-toolbar>
    <!-- Add Content Here -->
    <router-outlet></router-outlet>

  </mat-sidenav-content>
</mat-sidenav-container>
