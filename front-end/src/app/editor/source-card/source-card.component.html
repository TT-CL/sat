<mat-card appearance="outlined" class="document-card" #overlayOrigin >
  <mat-card-header>
    <div class="header vertical">
      <mat-card-title> {{doc.doc_name}} </mat-card-title>
      <mat-card-subtitle> Source text </mat-card-subtitle>
    </div>
  </mat-card-header>

  <mat-divider></mat-divider>
  <mat-card-content class="mat-card-dynamic-content">
    <ng-template [cdkPortalOutlet]="portalOutlet" (attached)="onPortalAttached($event)"></ng-template>
  </mat-card-content>
</mat-card>
