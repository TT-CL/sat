<mat-list role="list" class="dash-toolbar">
  <mat-list-item>
    <div class="horizontal-center">
      <button mat-flat-button
        matTooltip="Text reader"
        matTooltipPosition="right"
        matTooltipClass="hint-tooltip"
        [routerLink]="['../reader']" [color]="text_view_color">
        <mat-icon>subject</mat-icon>
      </button>
    </div>
  </mat-list-item>
  <mat-list-item>
    <div class="horizontal-center">
      <button mat-flat-button
        matTooltip="View Idea Units"
        matTooltipPosition="right"
        matTooltipClass="hint-tooltip"
        [routerLink]="['../iu']" [color]="iu_view_color">
        <mat-icon>mode_comment</mat-icon>
      </button>
    </div>
  </mat-list-item>
  <mat-list-item>
    <div class="horizontal-center">
      <button mat-flat-button
        matTooltip="Edit segmentation"
        matTooltipPosition="right"
        matTooltipClass="hint-tooltip"
        [routerLink]="['../edit']" [color]="edit_text_view_color">
        <mat-icon>create</mat-icon>
      </button>
    </div>
  </mat-list-item>
  @if (linkable) {
    <mat-list-item>
      <div class="horizontal-center">
        <button mat-flat-button
          matTooltip="Link Idea Units"
          matTooltipPosition="right"
          matTooltipClass="hint-tooltip"
          [routerLink]="['../link']" [color]="link_iu_view_color">
          <mat-icon>link</mat-icon>
        </button>
      </div>
    </mat-list-item>
  }
  <mat-list-item>
    <div class="horizontal-center">
      <button mat-flat-button
        matTooltip="Manage project"
        matTooltipPosition="right"
        matTooltipClass="hint-tooltip"
        [routerLink]="['../manager']" [color]="manage_project_color">
        <mat-icon>build</mat-icon>
      </button>
    </div>
  </mat-list-item>
  <mat-list-item>
    <div class="horizontal-center">
      <button mat-flat-button
        matTooltip="Backup and export"
        matTooltipPosition="right"
        matTooltipClass="hint-tooltip"
        [routerLink]="['../download']" [color]="download_project_color">
        <mat-icon>download</mat-icon>
      </button>
    </div>
  </mat-list-item>
</mat-list>
