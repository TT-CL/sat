<mat-card appearance="outlined" class="document-card">
  <mat-card-header>
      @if (summary_array.length <= 1) {
        <div class="header vertical">
          <mat-card-title> {{doc.doc_name}} </mat-card-title>
          <mat-card-subtitle> Summary text </mat-card-subtitle>
        </div>
      }
      @if (summary_array.length >1) {
        <div class="header horizontal">
          <mat-card-title>Summary</mat-card-title> 
          <mat-form-field subscriptSizing="dynamic">
            <mat-select [(value)]="summary_idx" #selector>
              @for (name of summary_array; track name; let i = $index) {
                <mat-option [value]="i">{{name}}</mat-option>
              }
            </mat-select>
          </mat-form-field>
        </div>
      }
  </mat-card-header>
  <mat-divider></mat-divider>
  <mat-card-content class="card-container mat-card-dynamic-content">
    <ng-template [cdkPortalOutlet]="portalOutlet" (attached)="onPortalAttached($event)"></ng-template>
  </mat-card-content>
</mat-card>
